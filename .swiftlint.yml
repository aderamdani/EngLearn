disabled_rules:
  - trailing_whitespace

opt_in_rules:
  - force_unwrapping
  - empty_count
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - discouraged_optional_boolean
  - explicit_init
  - fatal_error_message
  - first_where
  - implicitly_unwrapped_optional
  - modifier_order
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last

excluded:
  - EngLearnTests
  - EngLearnUITests
  - Preview Content
  - dist

line_length:
  warning: 120
  error: 150

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 40
  error: 60

custom_rules:
  no_color_opacity_background:
    regex: '\.background\(Color\(.+\)\.opacity'
    message: "Anti-Slop: Use .regularMaterial instead of Color.opacity"
    severity: error
  no_print_statement:
    regex: '\bprint\('
    message: "Anti-Slop: Use OSLog (Log.xxx) instead of print()"
    severity: error
  no_navigation_view:
    regex: '\bNavigationView\b'
    message: "Anti-Slop: Use NavigationSplitView or NavigationStack"
    severity: error
  no_state_object:
    regex: '@StateObject'
    message: "Anti-Slop: Use @State with @Observable on macOS 26+"
    severity: error
  no_dispatch_queue_main:
    regex: 'DispatchQueue\.main'
    message: "Anti-Slop: Use @MainActor or MainActor.run"
    severity: error
  no_any_view:
    regex: '\bAnyView\b'
    message: "Anti-Slop: Use @ViewBuilder or some View"
    severity: error
  no_timer_publish:
    regex: 'Timer\.publish'
    message: "Performance: Use .task with Task.sleep or TimelineView"
    severity: error
  no_on_appear_task:
    regex: '\.onAppear\s*\{\s*Task'
    message: "Anti-Slop: Use .task modifier instead of .onAppear { Task {} }"
    severity: error
