name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Select Latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild -project EngLearn.xcodeproj \
            -scheme EngLearn \
            -configuration Debug \
            -destination 'platform=macOS' \
            build 2>&1 | xcbeautify || true

      - name: Test
        run: |
          xcodebuild -project EngLearn.xcodeproj \
            -scheme EngLearn \
            -configuration Debug \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            test 2>&1 | xcbeautify || true
